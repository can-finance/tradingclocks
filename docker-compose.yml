services:
  tradingclocks:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tradingclocks-dev
    volumes:
      - .:/workspace                 # live edits reflect instantly
      - /workspace/node_modules      # isolate container's node_modules from host
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
